---
on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
      target-device:
        type: string
        required: true
      build-mode:
        type: string
        required: true
      build-type:
        type: string
        required: true
      python-version:
        type: string
        required: false
        default: "3.14"
      upload-docs-to-gh-pages:
        type: boolean
        required: false
        default: false
      ci-verbose:
        required: false
        type: boolean
        default: false
    secrets:
      NV_LEGATE_INTER_REPOS_ACCESS:
        required: true

jobs:
  setup-dependency:
    name: Resolve Legate dependency
    runs-on: linux-amd64-cpu4
    outputs:
      artifact_name: ${{ steps.dependency.outputs.dependency_artifact_name }}
      artifact_repository: ${{ steps.dependency.outputs.dependency_artifact_repository }}
      artifact_sha: ${{ steps.dependency.outputs.dependency_artifact_sha }}
      artifact_workflow: ${{ steps.dependency.outputs.dependency_artifact_workflow }}
    steps:
      - name: Checkout cuPyNumeric
        uses: actions/checkout@v7

      - name: Resolve Legate dependency artifact
        id: dependency
        env:
          BUILD_TYPE: ${{ inputs.build-type }}
          PLATFORM: ${{ inputs.platform }}
          PYTHON_VERSION: ${{ inputs.python-version }}
          TARGET_DEVICE: ${{ inputs.target-device }}
        run: |
          metadata="$(
            python3 continuous_integration/scripts/tools/legate_conda_artifact.py \
              cmake/versions.json \
              --build-type "${BUILD_TYPE}" \
              --platform "${PLATFORM}" \
              --python-version "${PYTHON_VERSION}" \
              --target-device "${TARGET_DEVICE}" \
              --cuda-version 13.0.0 \
              --network ucx
          )"
          jq -r '
            "dependency_artifact_name=\(.name)",
            "dependency_artifact_repository=\(.repository)",
            "dependency_artifact_sha=\(.sha)",
            "dependency_artifact_workflow=\(.workflow)"
          ' <<< "${metadata}" >> "${GITHUB_OUTPUT}"

  build-cupynumeric:
    if: ${{ github.repository_owner == 'nv-legate' }}
    needs: setup-dependency
    uses:
      nv-legate/legate-gh-ci/.github/workflows/gh-build.yml@v1.51
    with:
      build-has-tests: false
      client-repo: ${{ github.event.repository.name }}
      dependency-artifact-name: ${{ needs.setup-dependency.outputs.artifact_name }}
      dependency-artifact-repository: ${{ needs.setup-dependency.outputs.artifact_repository }}
      dependency-artifact-sha: ${{ needs.setup-dependency.outputs.artifact_sha }}
      dependency-artifact-workflow: ${{ needs.setup-dependency.outputs.artifact_workflow }}
      target-device: ${{ inputs.target-device }}
      runs-on: ${{ (inputs.platform == 'linux' && 'linux-amd64-cpu16') || (inputs.platform == 'mac' && 'macos-latest') }}
      build-type: ${{ inputs.build-type }}
      use-container: ${{ inputs.platform == 'linux' }}
      platform: ${{ inputs.platform }}
      legate-gh-ci-tag: "v1.51"
      build-mode: ${{ inputs.build-mode }}
      network: "ucx"
      python-version: ${{ inputs.python-version }}
      setup-python-proxy-cache: ${{ inputs.target-device != 'gpu' }}
      timeout: 90
      ci-verbose: ${{ inputs.ci-verbose }}
    secrets: inherit

  build-docs:
    needs:
      - build-cupynumeric
    name: Build cupynumeric docs (${{ inputs.platform }}, ${{ inputs.target-device }})

    uses:
      nv-legate/legate-gh-ci/.github/workflows/gh-test-within-container.yml@v1.51
    with:
      build-has-tests: false
      build-mode: ${{ inputs.build-mode }}
      build-type: ${{ inputs.build-type }}
      output-build-type: docs
      client-repo: ${{ github.event.repository.name }}
      has-gpu: false
      legate-gh-ci-tag: "v1.51"
      name: Build documentation
      network: "ucx"
      platform: ${{ inputs.platform }}
      python-version: ${{ inputs.python-version }}
      runs-on: ${{ (inputs.platform == 'linux' && 'linux-amd64-gpu-l4-latest-1') || (inputs.platform == 'mac' && 'macos-latest') }}
      target-device: ${{ inputs.target-device }}
      test-options: docs
      setup-python-proxy-cache: ${{ inputs.target-device != 'gpu' }}
      timeout: 30
      ci-verbose: ${{ inputs.ci-verbose }}
    secrets: inherit

  upload-docs-to-gh-pages:
    if: ${{ inputs.upload-docs-to-gh-pages && github.ref_name == 'main' }}
    needs:
      - build-docs
    runs-on: ${{ (inputs.platform == 'linux' && 'linux-amd64-cpu4') || (inputs.platform == 'mac' && 'macos-latest') }}
    timeout-minutes: 15
    steps:
      - name: Set environment variables
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          echo "${{ needs.build-docs.outputs.output-artifact-name }}"

          ARTIFACTS_DIR=$(realpath "$(pwd)/../artifacts")
          echo "ARTIFACTS_DIR=${ARTIFACTS_DIR}" >> $GITHUB_ENV

          mkdir -p "${ARTIFACTS_DIR}"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-docs.outputs.output-artifact-name }}
          path: ${{ env.ARTIFACTS_DIR }}

      - name: Summarize downloaded artifacts
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          pwd
          files=$(mktemp)
          find "${ARTIFACTS_DIR}" -type f | sort > "${files}"
          file_count=$(wc -l < "${files}" | tr -d '[:space:]')
          echo "Files: ${file_count}"
          # This upload job does not check out legate-gh-ci, so use the
          # workflow input directly instead of LEGATE_CI_VERBOSE.
          if [[ "${{ inputs.ci-verbose }}" == "true" ]]; then
            cat "${files}"
          else
            sed -n '1,200p' "${files}"
            if (( file_count > 200 )); then
              echo "... $((file_count - 200)) more files hidden (run with ci-verbose=true for full list)"
            fi
          fi
          rm -f "${files}"

      - name: Find index.html's parent folder
        shell: bash --noprofile --norc -euo pipefail {0}
        id: find_docs_dir
        run: |
          FILE_PATH="$(
            find "${{ env.ARTIFACTS_DIR }}" -name "index.html" -printf '%d %p\n' \
              | sort -nk1 \
              | cut -d' ' -f2- \
              | head -n 1
          )"
          if [ -z "${FILE_PATH}" ]; then
            echo "index.html not found" >&2
            exit 1
          fi
          PARENT_DIR=$(dirname "${FILE_PATH}")
          echo "docs_dir=${PARENT_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ steps.find_docs_dir.outputs.docs_dir }}
          token: ${{ secrets.NV_LEGATE_INTER_REPOS_ACCESS }}
          repository-name: "nv-legate/cupynumeric"
