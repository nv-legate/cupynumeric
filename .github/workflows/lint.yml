---
name: Lint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "pull-request/[0-9]+"
      - "*branch-*"
      - "main"

defaults:
  run:
    shell: bash -eou pipefail {0}

jobs:
  pre-commit:
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    strategy:
      fail-fast: false
    if: ${{ github.repository_owner == 'nv-legate' }}
    permissions:
      contents: read  # This is required for actions/checkout

    name: pre-commit

    steps:
      - name: Checkout ${{ github.event.repository.name }} (= this repo)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate requirements.txt
        run: |
          {
            echo "shellcheck-py"
            echo "cmakelang"
            echo "rich"
          } > requirements.txt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: run pre-commit
        uses: pre-commit/action@v3.0.1

      # Block padding the marker-reason baseline: it may only shrink relative
      # to the merge-base with the default branch (the pre-commit hook trusts
      # the file as-is). Until the baseline lands on the default branch the
      # check skips cleanly (baseline_at_ref -> None), so this is safe to keep
      # enabled even on the PR that first introduces the baseline.
      - name: Enforce marker-reason baseline ratchet
        run: |
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          base="$(git merge-base HEAD FETCH_HEAD)"
          python scripts/hooks/check_marker_reason.py --against "${base}"

  lint-pass:
    if: always()
    needs:
      - pre-commit
    runs-on: linux-amd64-cpu4
    timeout-minutes: 15
    steps:
      - name: Check job results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
