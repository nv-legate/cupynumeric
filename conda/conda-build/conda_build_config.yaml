---
gpu_enabled:
  - true
  - false

build_tests:
  - true
  - false

python:
  - 3.11
  - 3.12
  - 3.13
  # Pin 3.14 to non-free-threaded CPython until cp314t dependency coverage lands.
  - "3.14.* *_cp314"

numpy_version:
  # Not 2.1.0 which segfaults on asarray() sometimes, see
  # https://github.com/numpy/numpy/pull/27249
  - ">=1.24,!=2.1.0,<2.5.0"

cffi_version:
  - ">=1.0,<2.1"

opt_einsum_version:
  - ">=3.3,<3.5"

scipy_version:
  - ">=1.0,<1.18"

openblas_version:
  # Versions after v0.3.23 conflict with Realm's OpenMP runtime
  # see https://github.com/nv-legate/cupynumeric.internal/issues/342
  - ">=0.3.0,<=0.3.23"

cupy_version:
  - ">=12.0,<14.2"

cutensor_version:
  # cutensor 2.3 is required for CUDA 13
  - ">=2.0,<2.7"

libcufile_version:
  - ">=1.0,<1.19"

libcusolvermp_dev_version:
  - ">=0.7,<0.9"

nccl_version:
  # NCCL >=2.28 is required for ncclAlltoAll; keep this in sync
  # with the CMake NCCL version check.
  - ">=2.28,<2.31"

c_stdlib:
  - sysroot

c_stdlib_version:
  - "2.28"

cmake_version:
  - ">=3.30.4,<4.4"
